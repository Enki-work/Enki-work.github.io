<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompter Camera — 4K HDR Video & Teleprompter</title>
  <meta name="description" content="Record video while reading your script. The teleprompter overlay floats over the live camera feed.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --border: rgba(255,255,255,0.08);
      --accent: #5b8ff9; --accent2: #a78bfa; --text: #f0f0f5; --muted: #8888aa; --radius: 16px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      line-height: 1.6; -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; height: 60px;
      background: rgba(10,10,15,0.88); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 17px; font-weight: 600; letter-spacing: -0.3px; white-space: nowrap;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-center { display: flex; gap: 28px; list-style: none; }
    .nav-center a { color: var(--muted); text-decoration: none; font-size: 14px; transition: color .2s; }
    .nav-center a:hover { color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 12px; }

    /* Language switcher */
    .lang-switcher { position: relative; }
    .lang-btn {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; font-weight: 500;
      padding: 6px 12px; border-radius: 20px; cursor: pointer;
      transition: background .2s;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.1); }
    .lang-btn svg { width: 14px; height: 14px; fill: var(--muted); transition: transform .2s; }
    .lang-btn.open svg { transform: rotate(180deg); }
    .lang-dropdown {
      display: none; position: absolute; top: calc(100% + 8px); right: 0;
      background: #1a1a26; border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      min-width: 160px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }
    .lang-dropdown.open { display: block; }
    .lang-option {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      font-size: 13px; color: var(--muted);
      transition: background .15s, color .15s;
    }
    .lang-option:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .lang-option.active { color: var(--accent); background: rgba(91,143,249,0.08); }
    .lang-flag { font-size: 16px; line-height: 1; }

    .nav-cta {
      background: var(--accent); color: #fff; text-decoration: none;
      padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: 600;
      transition: opacity .2s; white-space: nowrap;
    }
    .nav-cta:hover { opacity: .85; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 100px 5% 80px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(91,143,249,0.12) 0%, transparent 70%),
                  radial-gradient(ellipse 60% 40% at 80% 80%, rgba(167,139,250,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(91,143,249,0.1); border: 1px solid rgba(91,143,249,0.3);
      padding: 5px 14px; border-radius: 20px;
      font-size: 12px; color: var(--accent); font-weight: 600;
      letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 24px;
    }
    .hero h1 {
      font-size: clamp(36px, 7vw, 80px); font-weight: 700;
      letter-spacing: -2px; line-height: 1.08; margin-bottom: 20px;
    }
    .hero h1 span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      font-size: clamp(15px, 2.5vw, 19px); color: var(--muted);
      max-width: 560px; margin: 0 auto 40px; line-height: 1.55;
    }
    .hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff; text-decoration: none;
      padding: 14px 28px; border-radius: 14px; font-size: 16px; font-weight: 600;
      transition: opacity .2s, transform .2s;
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text); text-decoration: none;
      padding: 14px 28px; border-radius: 14px; font-size: 16px; font-weight: 600;
      transition: background .2s, transform .2s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
    .apple-icon { width: 18px; height: 18px; fill: currentColor; }

    /* ── PHONE MOCKUP ── */
    .phone-wrap { margin-top: 64px; position: relative; display: inline-block; }
    .phone-frame {
      width: 280px; height: 570px; border-radius: 44px;
      border: 2px solid rgba(255,255,255,0.15); background: #0d0d14;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04), inset 0 1px 0 rgba(255,255,255,0.08);
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }
    .phone-notch {
      width: 100px; height: 30px; background: #0d0d14;
      border-bottom-left-radius: 18px; border-bottom-right-radius: 18px;
      position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 2;
      border: 2px solid rgba(255,255,255,0.1); border-top: none;
    }
    .phone-screen { flex: 1; display: flex; flex-direction: column; padding-top: 40px; position: relative; }
    .phone-camera-bg { position: absolute; inset: 0; background: linear-gradient(160deg, #1a2a1a 0%, #0e1a0e 50%, #0d130d 100%); }
    .phone-prompter {
      position: absolute; left: 12px; right: 12px; bottom: 80px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      border-radius: 12px; padding: 14px; border: 1px solid rgba(255,255,255,0.1);
    }
    .phone-prompter-fade {
      position: absolute; top: 0; left: 0; right: 0; height: 32px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
      border-radius: 12px 12px 0 0;
    }
    .phone-prompter-line { height: 8px; background: rgba(255,255,255,0.7); border-radius: 4px; margin-bottom: 8px; }
    .phone-prompter-line.short { width: 70%; }
    .phone-prompter-line.mid { width: 85%; }
    .phone-prompter-line.active { background: #fff; }
    .phone-controls {
      position: absolute; bottom: 20px; left: 0; right: 0;
      display: flex; justify-content: center; align-items: center; gap: 24px;
    }
    .record-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
    }
    .record-dot { width: 22px; height: 22px; border-radius: 50%; background: #ff3b30; }
    .ctrl-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15); }
    .phone-glow {
      position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%);
      width: 200px; height: 80px;
      background: radial-gradient(ellipse, rgba(91,143,249,0.25), transparent 70%);
      pointer-events: none;
    }

    /* ── SECTION COMMON ── */
    section { padding: 100px 5%; }
    .section-label { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    .section-title { font-size: clamp(26px, 4vw, 44px); font-weight: 700; letter-spacing: -1px; line-height: 1.15; margin-bottom: 16px; }
    .section-desc { font-size: 17px; color: var(--muted); max-width: 520px; line-height: 1.6; }

    /* ── FEATURES ── */
    #features { text-align: center; }
    #features .section-desc { margin: 0 auto 56px; }
    .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
    .feature-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; text-align: left;
      transition: border-color .3s, transform .3s;
    }
    .feature-card:hover { border-color: rgba(91,143,249,0.3); transform: translateY(-3px); }
    .feature-icon { width: 44px; height: 44px; border-radius: 12px; background: rgba(91,143,249,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 16px; }
    .feature-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .feature-card p { font-size: 14px; color: var(--muted); line-height: 1.5; }

    /* ── HOW IT WORKS ── */
    #how-it-works { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .steps-wrap { display: flex; gap: 48px; align-items: flex-start; max-width: 900px; flex-wrap: wrap; }
    .steps-wrap .section-title { max-width: 380px; }
    .steps { display: flex; flex-direction: column; gap: 24px; flex: 1; min-width: 260px; }
    .step { display: flex; gap: 16px; align-items: flex-start; }
    .step-num {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(91,143,249,0.15); border: 1px solid rgba(91,143,249,0.3);
      color: var(--accent); font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step-body h4 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .step-body p { font-size: 14px; color: var(--muted); line-height: 1.5; }

    /* ── AUDIENCE ── */
    #audience { text-align: center; }
    .audience-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 800px; margin: 40px auto 0; }
    .audience-tag {
      background: var(--surface); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: 500;
      transition: border-color .2s, color .2s;
    }
    .audience-tag:hover { border-color: var(--accent); color: var(--accent); }

    /* ── SPECS ── */
    #specs { max-width: 900px; margin: 0 auto; }
    #specs .section-title { text-align: center; margin-bottom: 48px; }
    .specs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .spec-item { background: var(--surface); padding: 24px 20px; }
    .spec-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .spec-value { font-size: 17px; font-weight: 600; }

    /* ── CTA ── */
    #cta { text-align: center; background: linear-gradient(160deg, rgba(91,143,249,0.07) 0%, transparent 60%); border-top: 1px solid var(--border); }
    #cta .section-title { margin-bottom: 12px; }
    #cta .section-desc { margin: 0 auto 36px; }

    /* ── FOOTER ── */
    footer { padding: 32px 5%; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    footer .logo { font-size: 15px; font-weight: 600; color: var(--muted); }
    footer .footer-links { display: flex; gap: 24px; list-style: none; }
    footer .footer-links a { font-size: 13px; color: var(--muted); text-decoration: none; }
    footer .footer-links a:hover { color: var(--text); }
    .footer-copy { font-size: 12px; color: var(--muted); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-center { display: none; }
      .nav-cta { display: none; }
    }
    @media (max-width: 480px) {
      .steps-wrap { flex-direction: column; }
      footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

// ─── Lang labels shown in the button ────────────────────────────────────────
const langLabels = { en: "EN", ja: "JA", ko: "KO", "zh-Hans": "ZH", "zh-Hant": "ZH", es: "ES" };
const langHtmlAttrs = { en: "en", ja: "ja", ko: "ko", "zh-Hans": "zh-Hans", "zh-Hant": "zh-Hant", es: "es" };

// ─── Resolve nested key like "hero.btnDownload" ──────────────────────────────
function resolve(obj, key) {
  return key.split('.').reduce((o, k) => (o && o[k] !== undefined ? o[k] : null), obj);
}

// ─── Apply translations ──────────────────────────────────────────────────────
function applyLang(lang) {
  const t = translations[lang] || translations.en;
  document.documentElement.lang = langHtmlAttrs[lang] || 'en';

  // Static data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const val = resolve(t, el.dataset.i18n);
    if (val !== null) el.textContent = val;
  });

  // Audience tags (dynamic)
  const grid = document.getElementById('audienceGrid');
  if (grid && t.audience && t.audience.tags) {
    grid.innerHTML = t.audience.tags.map(tag => `<div class="audience-tag">${tag}</div>`).join('');
  }

  // Update lang button label
  document.getElementById('langCurrent').textContent = langLabels[lang] || 'EN';

  // Highlight active option
  document.querySelectorAll('.lang-option').forEach(opt => {
    opt.classList.toggle('active', opt.getAttribute('onclick') === `setLang('${lang}')`);
  });
}

// ─── Language switcher UI ────────────────────────────────────────────────────
function toggleLangMenu() {
  const btn = document.getElementById('langBtn');
  const dd = document.getElementById('langDropdown');
  const open = dd.classList.toggle('open');
  btn.classList.toggle('open', open);
}

function setLang(lang) {
  localStorage.setItem('lang', lang);
  applyLang(lang);
  document.getElementById('langDropdown').classList.remove('open');
  document.getElementById('langBtn').classList.remove('open');
}

// Close dropdown when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.lang-switcher')) {
    document.getElementById('langDropdown').classList.remove('open');
    document.getElementById('langBtn').classList.remove('open');
  }
});

// ─── Init ────────────────────────────────────────────────────────────────────
(function init() {
  const saved = localStorage.getItem('lang');
  const browserLang = navigator.language || '';
  let lang = 'en';
  if (saved && translations[saved]) {
    lang = saved;
  } else if (browserLang.startsWith('ja')) {
    lang = 'ja';
  } else if (browserLang.startsWith('ko')) {
    lang = 'ko';
  } else if (browserLang === 'zh-TW' || browserLang === 'zh-HK' || browserLang.startsWith('zh-Hant')) {
    lang = 'zh-Hant';
  } else if (browserLang.startsWith('zh')) {
    lang = 'zh-Hans';
  } else if (browserLang.startsWith('es')) {
    lang = 'es';
  }
  applyLang(lang);
})();
</script>
